name: Shell validation

on:
  workflow_dispatch:
  push:
    paths:
      - tools/**/*.sh
      - minecraft/config/versions.sh
      - .editorconfig
      - .shellcheckrc
      - .github/workflows/shell-validation.yml
  pull_request:
    paths:
      - tools/**/*.sh
      - minecraft/config/versions.sh
      - .editorconfig
      - .shellcheckrc
      - .github/workflows/shell-validation.yml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: Bash syntax and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install shell tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: Collect shell files
        id: shell-files
        run: |
          mapfile -d '' -t shell_files < <(find tools -maxdepth 1 -type f -name '*.sh' -print0 | sort -z)
          # versions.sh is the only tracked shell helper outside tools/ that this repo validates.
          shell_files+=(minecraft/config/versions.sh)
          [[ ${#shell_files[@]} -gt 0 ]]
          printf '%s\n' "${shell_files[@]}" > /tmp/mc-server-shell-files.txt

      - name: Run Bash syntax checks
        run: |
          mapfile -t shell_files < /tmp/mc-server-shell-files.txt
          bash -n "${shell_files[@]}"

      - name: Run ShellCheck
        run: |
          mapfile -t shell_files < /tmp/mc-server-shell-files.txt
          shellcheck "${shell_files[@]}"

      - name: Check formatting
        run: |
          mapfile -t shell_files < /tmp/mc-server-shell-files.txt
          shfmt -d -i 2 -bn "${shell_files[@]}"
