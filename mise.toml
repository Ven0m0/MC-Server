# Mise Configuration | https://mise.jdx.dev/configuration.html
[settings]
auto_install = true
lockfile = true
activate_aggressive = true
#gix = true
go_skip_checksum = true

[settings.python]
uv_venv_auto = true
uv_venv_create_args = ["--system-site-packages", "--seed"]

[settings.cargo]
binstall = true

[settings.pipx]
uvx = true

[settings.npm]
bun = true

[tools]
#java = "oracle-graalvm"
#java = "temurin-25.0.3+9.0.LTS"
"github:ComunidadAylas/PackSquash" = "latest"
"github:zeroBzeroT/ChunkCleaner" = "latest"
#"cargo:rustic-rs" = "latest"
#python = "3.14"
#uv = "latest"
#ruff = "latest"
#prek = "latest"

[env]
#_.java.GRAALVM_HOME = "${MISE_INSTALLS}/graalvm/${version}"
PROJECT_ROOT = "{{config_root}}"
UV_LINK_MODE = "symlink"
_.python.venv = { path = ".venv", create = true, uv_create_args = ["--seed", "--system-site-packages"] }
DO_NOT_TRACK = "1"
NODE_NO_WARNINGS = "1"
PYTHONOPTIMIZE = "1"
CARGO_NET_GIT_FETCH_WITH_CLI = "false"
CARGO_HTTP_MULTIPLEXING = "true"
BINSTALL_DISABLE_TELEMETRY = "true"

[hooks]
enter = "mise i -yq"
