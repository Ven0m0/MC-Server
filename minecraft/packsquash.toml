# https://github.com/ComunidadAylas/PackSquash
# Global options
pack_directory = ''
output_file_path = ''

validate_pack_metadata_file = false
ignore_system_and_hidden_files = false
skip_pack_icon = false
allow_mods = ['OptiFine', 'Minecraft Transit Railway 3']
automatic_minecraft_quirks_detection = true
work_around_minecraft_quirks = [
  'grayscale_images_gamma_miscorrection',
  'restrictive_banner_layer_texture_format_check',
  'bad_entity_eye_layer_texture_transparency_blending',
  'java8_zip_parsing',
  'ogg_obfuscation_incompatibility',
]

automatic_asset_types_mask_detection = true

recompress_compressed_files = false
zip_compression_iterations = 5
zip_spec_conformance_level = 'balanced'
percentage_of_zip_structures_tuned_for_obfuscation_discretion = 0
size_increasing_zip_obfuscation = false

# Images
# maximum_width_and_height applies to all PNGs, including pack.png (the pack
# icon, which isn't atlas-stitched and has no power-of-two requirement) --
# PackSquash doesn't support a per-file override for this option, so the
# global limit must be high enough to admit oversized icons too.
['**/*.png']
downsize_if_single_color = true
skip_alpha_optimizations = false
maximum_width_and_height = 2048
image_data_compression_iterations = 20
color_quantization_target = 'auto'

# OptiFine sky textures can be non-power-of-two — copy as-is
['assets/minecraft/optifine/sky/**/*.png']
force_include = true

# Audio
['**/*.{ogg,oga,mp3,m4a,flac,wav}']
empty_audio_optimization = true
two_pass_vorbis_optimization_and_validation = true
transcode_ogg = true
bitrate_control_mode = 'CQF'
ogg_obfuscation = false
target_bitrate_control_metric = 96
channels = 1

# JSON / metadata — allow comments for broad compatibility
['**/*.{json,jsonc,mcmeta,mcmetac,jem,jemc,jpm,jpmc,bbmodel}']
minify_json = true
delete_bloat_keys = true
always_allow_json_comments = true

# Shaders — treat all as include shaders to avoid main() validation failures
['**/*.{vsh,fsh,glsl}']
shader_source_transformation_strategy = 'keep_as_is'
is_top_level_shader = false

# Legacy language files
['**/*.lang']
minify_legacy_language = true
strip_legacy_language_bom = true

# Properties files
['**/*.properties']
minify_properties = false

# Command functions
['**/*.mcfunction']
minify_command_function = true


# Per-file overrides below

# A special silence file that for some reason must be kept exactly as-is
['assets/craftmine/sounds/special_silence.ogg']
empty_audio_optimization = false

# Audio several hours long that would take a lot of time to transcode
['assets/craftmine/sounds/forest_soundscape.ogg']
transcode_ogg = false
two_pass_vorbis_optimization_and_validation = false

# Include copyright and authorship files
['**/{COPYING,AUTHORS}']
force_include = false

# Dev/test JSON files that may be malformed
['**/test.json']
force_include = false
